services:
  mongodb:
    image: mongo:7.0
    container_name: keo_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: keo_secret_2024
      MONGO_INITDB_DATABASE: keo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - keo_network

  mongo-express:
    image: mongo-express:1.0.2
    container_name: keo_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: keo_secret_2024
      ME_CONFIG_MONGODB_URL: mongodb://admin:keo_secret_2024@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongodb
    networks:
      - keo_network

volumes:
  mongo_data:
    driver: local

networks:
  keo_network:
    driver: bridge
